name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/pingreports/k8s-agent:${{ steps.ver.outputs.version }}
            ghcr.io/pingreports/k8s-agent:latest

  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          ref="${GITHUB_REF#refs/tags/}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Sync chart version + appVersion to release
        run: |
          v="${{ steps.ver.outputs.version }}"
          sed -i "s/^version:.*/version: ${v}/" charts/k8s-agent/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${v}\"/" charts/k8s-agent/Chart.yaml

      - name: Package + publish chart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_TOKEN}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm package charts/k8s-agent -d /tmp/charts
          helm push /tmp/charts/k8s-agent-*.tgz oci://ghcr.io/pingreports/charts
