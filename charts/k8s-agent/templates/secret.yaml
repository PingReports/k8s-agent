apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-agent.name" . }}-creds
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  cluster-id: {{ required "cluster.id is required (PingReports cluster UUID)" .Values.cluster.id | quote }}
  cluster-secret: {{ required "cluster.secret is required (PingReports cluster secret)" .Values.cluster.secret | quote }}
