apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-agent.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-agent.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-agent.name" . }}-read
  labels: {{- include "k8s-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - pods
      - persistentvolumes
      - persistentvolumeclaims
      - services
      - endpoints
      - events
      - configmaps  # NAMES ONLY - we never read .data
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  # NOTE: explicitly NO access to secrets, serviceaccounts/token, or pod/exec.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-agent.name" . }}-read
  labels: {{- include "k8s-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-agent.name" . }}-read
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-agent.name" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.agent.autoUpdate }}
---
# Self-update: agent may patch its own Deployment ONLY (resourceNames pin).
# Cannot read or modify any other workload. Cannot create or delete.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-agent.name" . }}-self
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: [{{ include "k8s-agent.name" . | quote }}]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-agent.name" . }}-self
  namespace: {{ .Release.Namespace }}
  labels: {{- include "k8s-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-agent.name" . }}-self
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-agent.name" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
